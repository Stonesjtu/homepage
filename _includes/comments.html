{% if site.comments.enabled and page.comments != false %}
<section class="comments" aria-labelledby="comments-title">
  <div class="comments-heading">
    <p class="eyebrow">Discussion</p>
    <h2 id="comments-title">Comments</h2>
  </div>

  {% if site.comments.provider == "giscus" %}
  <script
    src="https://giscus.app/client.js"
    data-repo="{{ site.comments.repo }}"
    data-repo-id="{{ site.comments.repo_id }}"
    data-category="{{ site.comments.category }}"
    data-category-id="{{ site.comments.category_id }}"
    data-mapping="pathname"
    data-strict="1"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="light"
    data-lang="en"
    crossorigin="anonymous"
    async>
  </script>
  {% endif %}
</section>
{% endif %}
