- scope: Distributed training and speech systems
  tags: ASR · TTS · Wakeup · GPU inference
  title: Led a PyTorch-based distributed training platform upgrade
  points:
    - Moved internal speech training workflows from Kaldi-era tooling to a newer PyTorch stack.
    - Improved training speed by 2x, reduced memory use by 5x, and lowered relative WER by 5% to 10%.
    - Supported CE, CTC, MMI, and LAS training criteria with multi-task, multi-view, and teacher-student recipes.
    - Stabilized training for ASR, TTS, and wakeup models, and accelerated TFServing-based GPU inference.
    - Reduced NNLM latency by 5x and improved end-to-end ASR real-time factor by 25x.
- scope: Microsoft Research intern, Seattle
  tags: Spring 2019
  title: Designed memory-efficient pipeline model-parallel training
  points:
    - Worked on vertical model splitting and pipeline training for very large models.
    - Reduced communication pressure by shifting pipeline exchange from weights toward activations.
    - Used layered weight stashing to address high memory use in PipeDream-style training.
    - Combined the lower memory footprint of GPipe with PipeDream's bubble-free execution characteristics.
- scope: Edge inference and audio AI
  tags: Runtime · compiler · quantization
  title: Built low-cost chip inference and model compression systems
  points:
    - Developed a C99-compatible graph inference engine for low-cost edge chips and ASIC accelerators such as NPUs.
    - Built ONNX frontend parsing, graph optimization, backend code generation, and micro-kernel tiling search.
    - Defined NPU operators and specs for GEMM, Conv2D, activation, unified memory, layout, and compiler behavior.
    - Led acoustic model miniaturization for wakeup and recognition workloads under RAM and compute limits.
    - Built quantization-aware training flows for 16-bit, 8-bit, 4-bit, and 1-bit deployment with mixed precision support.
- scope: NPU kernel and chip validation
  tags: Operators · libraries · bring-up
  title: Optimized operators and validated custom NPU silicon
  points:
    - Translated product network requirements into operator and compiler-stack development plans.
    - Tuned NPU kernels for element-wise operations, NMS, attention, and other performance-critical workloads.
    - Developed high-performance acceleration library primitives comparable to CUB, including scan, reduce, and sort.
    - Worked on operator fusion, automatic compilation, and code generation.
    - Owned operator-side chip bring-up validation, tracked silicon issues, and drove fixes or practical workarounds.
