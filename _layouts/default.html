<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{ site.description }}" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="icon" href="{{ '/assets/favicon.png' | relative_url }}" type="image/png" sizes="512x512" />
    <link rel="shortcut icon" href="{{ '/assets/favicon.png' | relative_url }}" type="image/png" />
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">{{ site.title }}</a>
      <nav aria-label="Primary navigation">
        <a href="{{ '/#writing' | relative_url }}">Writing</a>
        <a href="{{ '/experience/' | relative_url }}">Experience &amp; Background</a>
        <a href="{{ '/#contact' | relative_url }}">Contact</a>
      </nav>
    </header>

    {{ content }}

    <footer>
      <p>© 2026 {{ site.title }}. Built with Jekyll for GitHub Pages.</p>
      {% include visitor-counter.html %}
    </footer>
    {% include analytics.html %}
  </body>
</html>
